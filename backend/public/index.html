<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orders Dashboard</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f6f7fb; color: #111827; }
      .wrap { max-width: 1100px; margin: 32px auto; padding: 0 16px; }
      .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 16px; margin-bottom: 16px; }
      h1 { margin: 0 0 12px; font-size: 24px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; }
      input { padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; min-width: 220px; }
      button { padding: 10px 14px; border: 0; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; }
      button:disabled { opacity: .6; cursor: default; }
      .muted { color: #6b7280; font-size: 14px; }
      .error { color: #b91c1c; margin-top: 8px; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th, td { border-bottom: 1px solid #e5e7eb; padding: 10px 8px; text-align: left; vertical-align: top; }
      th { background: #f9fafb; position: sticky; top: 0; }
      .table-wrap { overflow: auto; max-height: 70vh; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Orders Dashboard</h1>
        <p class="muted">Sign in to view all orders submitted from the landing page.</p>
        <form id="login-form" class="row">
          <input id="username" placeholder="Username" autocomplete="username" required />
          <input id="password" type="password" placeholder="Password" autocomplete="current-password" required />
          <button type="submit">Login</button>
          <button type="button" id="logout-btn">Logout</button>
        </form>
        <p class="muted" id="auth-status">Not authenticated.</p>
        <p class="error" id="error-msg" hidden></p>
      </div>

      <div class="card">
        <div class="row" style="justify-content: space-between;">
          <strong>Incoming Orders</strong>
          <div class="row">
            <button id="refresh-btn" type="button">Refresh</button>
            <button id="export-btn" type="button">Export CSV</button>
          </div>
        </div>
        <p class="muted" id="count-msg">No data loaded yet.</p>
        <div class="table-wrap">
          <table id="orders-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Phone</th>
                <th>City</th>
                <th>Address</th>
                <th>Model</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Source</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var loginForm = document.getElementById("login-form");
        var errorMsg = document.getElementById("error-msg");
        var authStatus = document.getElementById("auth-status");
        var refreshBtn = document.getElementById("refresh-btn");
        var exportBtn = document.getElementById("export-btn");
        var logoutBtn = document.getElementById("logout-btn");
        var countMsg = document.getElementById("count-msg");
        var tbody = document.querySelector("#orders-table tbody");

        function showError(msg) {
          errorMsg.hidden = !msg;
          errorMsg.textContent = msg || "";
        }

        function formatDate(value) {
          if (!value) return "-";
          var d = new Date(value);
          if (isNaN(d.getTime())) return value;
          return d.toLocaleString();
        }

        function renderRows(rows) {
          tbody.innerHTML = "";
          if (!rows.length) {
            var tr = document.createElement("tr");
            tr.innerHTML = "<td colspan='9'>No orders yet.</td>";
            tbody.appendChild(tr);
            countMsg.textContent = "0 orders";
            return;
          }

          rows.forEach(function (row) {
            var tr = document.createElement("tr");
            tr.innerHTML =
              "<td>" + formatDate(row.created_at) + "</td>" +
              "<td>" + (row.fullname || "") + "</td>" +
              "<td>" + (row.phone || "") + "</td>" +
              "<td>" + (row.city || "") + "</td>" +
              "<td>" + (row.address || "") + "</td>" +
              "<td>" + (row.model || "") + "</td>" +
              "<td>" + (row.quantity || "") + "</td>" +
              "<td>" + (row.total_price || "") + "</td>" +
              "<td>" + (row.source_form || "") + "</td>";
            tbody.appendChild(tr);
          });
          countMsg.textContent = rows.length + " orders";
        }

        function setAuthenticatedUi(authenticated, username) {
          authStatus.textContent = authenticated
            ? "Logged in as: " + (username || "admin")
            : "Not authenticated.";
        }

        function apiFetch(url, options) {
          var opts = options || {};
          opts.credentials = "same-origin";
          return fetch(url, opts);
        }

        function checkSession() {
          return apiFetch("/api/me")
            .then(function (res) {
              if (res.status === 401) {
                setAuthenticatedUi(false);
                return false;
              }
              if (!res.ok) throw new Error("failed");
              return res.json().then(function (data) {
                setAuthenticatedUi(true, data.username);
                return true;
              });
            })
            .catch(function () {
              setAuthenticatedUi(false);
              return false;
            });
        }

        function loadOrders() {
          showError("");
          refreshBtn.disabled = true;
          apiFetch("/api/orders")
            .then(function (res) {
              if (res.status === 401) throw new Error("unauthorized");
              if (!res.ok) throw new Error("failed");
              return res.json();
            })
            .then(renderRows)
            .catch(function (err) {
              if (err.message === "unauthorized") {
                showError("Invalid login or password.");
                renderRows([]);
              } else {
                showError("Could not load orders. Try again.");
              }
            })
            .finally(function () {
              refreshBtn.disabled = false;
            });
        }

        loginForm.addEventListener("submit", function (e) {
          e.preventDefault();
          var username = document.getElementById("username").value.trim();
          var password = document.getElementById("password").value;
          apiFetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username, password: password })
          })
            .then(function (res) {
              if (res.status === 401) throw new Error("unauthorized");
              if (!res.ok) throw new Error("failed");
              return checkSession();
            })
            .then(function (ok) {
              if (ok) {
                showError("");
                loadOrders();
              }
            })
            .catch(function (err) {
              if (err.message === "unauthorized") {
                showError("Invalid username or password.");
              } else {
                showError("Login failed. Try again.");
              }
            });
        });

        logoutBtn.addEventListener("click", function () {
          apiFetch("/api/logout", { method: "POST" })
            .finally(function () {
              setAuthenticatedUi(false);
              showError("Logged out.");
              renderRows([]);
            });
        });

        exportBtn.addEventListener("click", function () {
          window.location.href = "/api/orders/export.csv";
        });

        refreshBtn.addEventListener("click", loadOrders);
        checkSession().then(function (ok) {
          if (ok) loadOrders();
          else renderRows([]);
        });
      })();
    </script>
  </body>
</html>
